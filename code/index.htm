<p>오늘 드래곤 블레이저스 공식 홈페이지가 엄청 이상한 링크들로 업뎃됐어<a href="../chapter1/index.htm">.</a></p>
<p>단서가 있나 싶어서 공식 홈페이지를 <a href="../egg/index.htm">싹 다 뒤져봤는데</a>, 지금까지 한 40페이지 정도 찾은 듯.</p>
<p>퍼즐도 없고 어디로 이어지지도 않는 거 보면 ARG(대체현실게임)는 아닌 거 같아.</p>
<p>개발자분들이 올해 단체로 상한 과일 케이크라도 주워 드셨나? ㅋㅋㅋ</p>
